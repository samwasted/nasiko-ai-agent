services:
  a2a-weather:
    build: .
    container_name: a2a-weather
    environment:
      - OPENAI_API_KEY=your-openai-api-key-here
      # Add your custom environment variables here
    stdin_open: true
    ports:
      - "5000"
    tty: true
    networks:
      - agents-net

networks:
  agents-net:
    external: true